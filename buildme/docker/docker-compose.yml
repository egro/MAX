services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-waa}
      POSTGRES_USER: ${POSTGRES_USER:-waa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-waa}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "${WEB_PORT:-7077}:8000"
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-changeme}
      DATABASE_URL: postgresql://${POSTGRES_USER:-waa}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-waa}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile.engine
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-changeme}
      DATABASE_URL: postgresql://${POSTGRES_USER:-waa}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-waa}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      ENGINE_NAME: ${ENGINE_NAME:-engine-default}
      ENGINE_NETWORK_TAG: ${ENGINE_NETWORK_TAG:-default}
      HOST_IP: ${HOST_IP}
      WEB_API_URL: http://web:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
