services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-MaxAttack}
      POSTGRES_USER: ${POSTGRES_USER:-MaxAttack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Postgres_Password_changeMe!}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-MaxAttack}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    command: redis-server --requirepass ${REDIS_PASSWORD:-This-is-a-poor-Redis-password!}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-This-is-a-poor-Redis-password!}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: webhost/Dockerfile.web
    ports:
      - "${WEB_PORT:-7077}:8000"
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-changeme}
      DATABASE_URL: postgresql://${POSTGRES_USER:-MaxAttack}:${POSTGRES_PASSWORD:-Postgres_Password_changeMe!}@db:5432/${POSTGRES_DB:-MaxAttack}
      REDIS_URL: redis://:${REDIS_PASSWORD:-This-is-a-poor-Redis-password!}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
