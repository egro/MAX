<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MAX · Security Assessment Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #f0eee9; }
    * { box-sizing: border-box; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="shared-data.js"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="pentest-app-right.jsx"></script>
  <script type="text/babel" src="pentest-app.jsx"></script>
  <script type="text/babel" src="setup-wizard.jsx"></script>
  <script type="text/babel" src="report-deliverable.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "autonomy": "review",
      "layout": "triple",
      "density": "compact",
      "theme": "#22d3ee"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      return (
        <>
          <DesignCanvas>
            <DCSection
              id="workspace"
              title="MAX · Security Assessment Platform"
              subtitle="Plan/Build modes · methodology-driven phases · CVSS-scored findings · markdown report">

              <DCArtboard id="workspace-build" label="Workspace · BUILD mode + Findings + CVSS" width={1440} height={900}>
                {React.createElement(window.PentestApp, { t, rightTab: "findings", initialMode: "build" })}
              </DCArtboard>

              <DCArtboard id="workspace-plan" label="Workspace · PLAN mode + Report (Markdown)" width={1440} height={900}>
                {React.createElement(window.PentestApp, { t, rightTab: "report", initialMode: "plan" })}
              </DCArtboard>

              <DCArtboard id="setup-wizard" label="Engagement setup wizard" width={1440} height={900}>
                {React.createElement(window.EngagementWizard, { t })}
              </DCArtboard>

              <DCArtboard id="report-deliverable" label="Report deliverable · full-page PDF preview" width={900} height={1180}>
                {React.createElement(window.ReportDeliverable, { t })}
              </DCArtboard>

              <DCPostIt top={20} left={60} rotate={-2} width={240}>
                <b>Three live screens.</b> Click into any to explore. The composer accepts input and the quick-action buttons actually append to the stream.
              </DCPostIt>

              <DCPostIt top={150} right={40} rotate={2} width={250}>
                <b>Toggle the PLAN/BUILD pill</b> in the top bar to switch between chat-only reasoning and execution. Quick-action chips change too.
              </DCPostIt>

              <DCPostIt bottom={-90} left={60} rotate={1.5} width={260}>
                <b>CVSS 3.1</b> on every finding — flip metrics and watch the score recalculate live. Severity badge updates with it.
              </DCPostIt>

              <DCPostIt bottom={-90} right={40} rotate={-1.5} width={260}>
                Wizard step nav is clickable. Try jumping between steps · all fields persist.
              </DCPostIt>

            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Agent" />
            <TweakRadio label="Autonomy" value={t.autonomy}
              options={[
                { value: "passive", label: "Passive" },
                { value: "review",  label: "Review" },
                { value: "auto",    label: "Auto" },
              ]}
              onChange={(v) => setTweak("autonomy", v)} />

            <TweakSection label="Workspace" />
            <TweakRadio label="Panel layout" value={t.layout}
              options={[
                { value: "single", label: "Single" },
                { value: "split",  label: "Split" },
                { value: "triple", label: "Triple" },
              ]}
              onChange={(v) => setTweak("layout", v)} />
            <TweakRadio label="Density" value={t.density}
              options={[
                { value: "compact", label: "Compact" },
                { value: "comfy",   label: "Comfy" },
              ]}
              onChange={(v) => setTweak("density", v)} />

            <TweakSection label="Accent" />
            <TweakColor label="Theme" value={t.theme}
              options={["#f5a623", "#22d3ee", "#e879f9", "#a3e635"]}
              onChange={(v) => setTweak("theme", v)} />
          </TweaksPanel>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
